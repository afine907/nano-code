name: CI

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  pull_request:
    branches: [master, main]
  release:
    types: [published]

jobs:
  lint-and-test:
    name: 🔍 Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup uv package manager
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 🐍 Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: 📦 Install project dependencies
        run: uv sync --all-extras --dev

      - name: 🔍 Run linting with ruff
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: 🏷️ Run type checking with mypy
        run: uv run mypy src/

      - name: 🧪 Run Python test suite with coverage
        run: uv run pytest tests/ -v --cov=src/jojo_code --cov-report=xml -m "not e2e or longcat"

      - name: 📊 Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  typescript-tests:
    name: 🎨 TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 🐍 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔍 Run TypeScript tests
        run: cd packages/cli && pnpm test -- --run

      - name: 🔍 Type check
        run: cd packages/cli && pnpm typecheck

  build:
    name: 🏗️ Build package
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup uv package manager
        uses: astral-sh/setup-uv@v5

      - name: 🏗️ Build distribution packages
        run: uv build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  publish:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    environment:
      name: pypi
      url: https://pypi.org/project/jojo-code/

    permissions:
      id-token: write

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: 📦 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
